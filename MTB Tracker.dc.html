<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
html,body{margin:0;padding:0;background:#141416;}
*{box-sizing:border-box}
a{color:#F4661F}
a:hover{color:#FF8A4C}
button{font-family:'Oswald',sans-serif}
input:focus{outline:none;border-bottom-color:#F4661F !important}
::placeholder{color:#55555d;font-weight:400}
input[type="date"]{color-scheme:dark}
@keyframes pulseRing{0%{transform:scale(1);opacity:.8}70%{transform:scale(2.2);opacity:0}100%{transform:scale(2.2);opacity:0}}
@keyframes slideUp{from{transform:translateY(105%)}to{transform:translateY(0)}}
@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes zoomIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</helmet>
<div style="min-height:100vh;background:#1B1B1E;color:#E8E8EA;font-family:'Open Sans',sans-serif;max-width:430px;margin:0 auto;border-left:1px solid #26262b;border-right:1px solid #26262b;display:flex;flex-direction:column">

  <header data-screen-label="Header" style="padding:20px 16px 12px;border-bottom:1px solid #2c2c31">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
      <h1 style="font-family:'Oswald',sans-serif;font-weight:700;font-size:32px;letter-spacing:.01em;margin:0;text-transform:uppercase;line-height:.95">My Bike<br /><span style="color:#F4661F">Settings</span></h1>
      <button onClick="{{ toggleBike }}" style="font-size:13px;letter-spacing:.1em;font-weight:600;color:#F4661F;background:none;border:1px solid #3a3a40;border-radius:3px;padding:10px 14px;cursor:pointer;min-height:44px">{{ bikeToggleLabel }}</button>
    </div>
    <div style="font-size:11px;font-weight:700;color:#9A9AA2;margin-top:10px;letter-spacing:.16em;text-transform:uppercase">{{ bikeSubtitle }}</div>

    <sc-if value="{{ bikeOpen }}" hint-placeholder-val="{{ false }}">
      <div style="margin-top:14px;background:#232327;border:1px solid #313136;border-radius:6px;padding:4px 14px 14px;animation:riseIn .3s ease">
        <label style="display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid #313136">
          <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:104px">NAME</span>
          <input name="name" value="{{ bike.name }}" onInput="{{ onBikeField }}" placeholder="e.g. The Mullet" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0" />
        </label>
        <label style="display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid #313136">
          <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:104px">MAKE / MODEL</span>
          <input name="make" value="{{ bike.make }}" onInput="{{ onBikeField }}" placeholder="brand + model" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0" />
        </label>
        <label style="display:flex;align-items:baseline;gap:12px;padding:10px 0">
          <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:104px">PURCHASED</span>
          <input name="purchased" type="date" value="{{ bike.purchased }}" onInput="{{ onBikeField }}" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0" />
        </label>
      </div>
    </sc-if>
  </header>

  <section data-screen-label="Bike" style="position:relative;margin:14px 12px 0;border:1px solid #2c2c31;border-radius:6px;background-image:radial-gradient(#26262b 1px, transparent 1px);background-size:18px 18px;padding:18px 10px 12px">
    <div style="position:relative;aspect-ratio:893/506">
      <div style="position:absolute;inset:0;background:#C9C9CF;-webkit-mask-image:url('assets/bike-fs.png');mask-image:url('assets/bike-fs.png');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center"></div>
      <sc-if value="{{ hasSel }}" hint-placeholder-val="{{ false }}">
        <div style="position:absolute;left:{{ selBox.x }}%;top:{{ selBox.y }}%;width:{{ selBox.w }}%;height:{{ selBox.h }}%;pointer-events:none;filter:drop-shadow(0 0 7px rgba(244,102,31,.75));animation:fadeIn .3s ease">{{ partOutline }}</div>
      </sc-if>
      <sc-for list="{{ hotspots }}" as="h" hint-placeholder-count="10">
        <button onClick="{{ h.pick }}" aria-label="{{ h.label }}" style="position:absolute;left:{{ h.x }}%;top:{{ h.y }}%;transform:translate(-50%,-50%);width:44px;height:44px;background:none;border:none;padding:0;cursor:pointer;z-index:2">
          <span style="position:absolute;inset:0;display:grid;place-items:center">
            <span style="position:absolute;width:22px;height:22px;border-radius:50%;border:2px solid rgba(244,102,31,.6);animation:pulseRing 2.2s ease-out infinite;{{ h.ringExtra }}"></span>
            <span style="width:14px;height:14px;border-radius:50%;background:{{ h.dotBg }};border:2px solid #F4661F;box-shadow:{{ h.dotShadow }}"></span>
          </span>
        </button>
      </sc-for>
    </div>
    <sc-if value="{{ noSel }}" hint-placeholder-val="{{ true }}">
      <div style="text-align:center;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.2em;color:#77777f;padding:6px 0 2px">TAP A DOT TO DIAL IT IN</div>
    </sc-if>
  </section>

  <nav data-screen-label="Part chips" style="display:flex;gap:8px;overflow-x:auto;padding:14px 12px 4px;scrollbar-width:none">
    <sc-for list="{{ chips }}" as="c" hint-placeholder-count="10">
      <button onClick="{{ c.pick }}" style="flex:0 0 auto;font-size:13px;font-weight:600;letter-spacing:.07em;padding:12px 14px;border-radius:3px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};cursor:pointer;min-height:44px">{{ c.label }}</button>
    </sc-for>
  </nav>

  <sc-if value="{{ showBackdrop }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeCard }}" style="position:fixed;inset:0;background:rgba(8,8,10,.55);backdrop-filter:blur(2px);z-index:30;animation:fadeIn .25s ease"></div>
  </sc-if>

  <sc-if value="{{ hasSel }}" hint-placeholder-val="{{ false }}">
    <div key="{{ cardKey }}" data-screen-label="Part card" style="{{ cardWrap }};box-sizing:border-box">
      <div style="background:#232327;border:1px solid #38383E;padding:0 16px 18px;{{ cardInnerExtra }}">
        <div style="height:14px;margin:0 -16px;background:repeating-linear-gradient(-45deg,#4a4a52 0 2px,transparent 2px 6px);border-bottom:1px solid #38383E"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px">
          <span style="font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.22em;color:#F4661F">{{ typeBadge }}</span>
          <button onClick="{{ closeCard }}" aria-label="Close" style="background:none;border:1px solid #3a3a40;border-radius:3px;color:#9A9AA2;width:40px;height:40px;font-size:18px;cursor:pointer;line-height:1">✕</button>
        </div>
        <h2 style="font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;margin:6px 0 2px;letter-spacing:.01em;text-transform:uppercase;line-height:1">{{ selLabel }}</h2>
        <p style="margin:0 0 6px;font-size:13px;color:#9A9AA2">{{ selBlurb }}</p>

        <sc-if value="{{ isTire }}" hint-placeholder-val="{{ false }}">
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">DRY &amp; DUSTY</span>
            <input name="dry" value="{{ val.dry }}" onInput="{{ onField }}" inputMode="decimal" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
            <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">{{ unit }}</span>
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">WET &amp; WILD</span>
            <input name="wet" value="{{ val.wet }}" onInput="{{ onField }}" inputMode="decimal" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
            <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">{{ unit }}</span>
          </label>
        </sc-if>

        <sc-if value="{{ isSus }}" hint-placeholder-val="{{ false }}">
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">MODEL</span>
            <input name="model" value="{{ val.model }}" onInput="{{ onField }}" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right" />
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">SAG</span>
            <input name="sag" value="{{ val.sag }}" onInput="{{ onField }}" inputMode="decimal" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
            <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">%</span>
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">PRESSURE</span>
            <input name="psi" value="{{ val.psi }}" onInput="{{ onField }}" inputMode="decimal" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
            <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">{{ unit }}</span>
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">COMPRESSION</span>
            <input name="comp" value="{{ val.comp }}" onInput="{{ onField }}" placeholder="clicks" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">REBOUND</span>
            <input name="reb" value="{{ val.reb }}" onInput="{{ onField }}" placeholder="clicks" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
          </label>
        </sc-if>

        <sc-if value="{{ isTorque }}" hint-placeholder-val="{{ false }}">
          <sc-if value="{{ isSeat }}" hint-placeholder-val="{{ false }}">
            <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
              <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">HEIGHT</span>
              <input name="height" value="{{ val.height }}" onInput="{{ onField }}" inputMode="decimal" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
              <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">MM</span>
            </label>
          </sc-if>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">TORQUE</span>
            <input name="nm" value="{{ val.nm }}" onInput="{{ onField }}" inputMode="decimal" placeholder="—" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
            <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">NM</span>
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">LAST CHECKED</span>
            <input name="checked" type="date" value="{{ val.checked }}" onInput="{{ onField }}" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right" />
          </label>
        </sc-if>

        <sc-if value="{{ isReplace }}" hint-placeholder-val="{{ false }}">
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">INSTALLED</span>
            <input name="installed" type="date" value="{{ val.installed }}" onInput="{{ onField }}" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right" />
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">LAST CHECKED</span>
            <input name="checked" type="date" value="{{ val.checked }}" onInput="{{ onField }}" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right" />
          </label>
          <label style="display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136">
            <span style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px">SWAP EVERY</span>
            <input name="interval" value="{{ val.interval }}" onInput="{{ onField }}" inputMode="numeric" placeholder="{{ intervalDefault }}" style="flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right" />
            <span style="font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2">MONTHS</span>
          </label>
          <div style="font-size:11px;color:#77777f;padding-top:8px">Stock suggestion: every {{ intervalDefault }} months. Ride more, swap sooner.</div>
        </sc-if>

        <div style="padding-top:12px">
          <div style="font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;padding-bottom:6px">NOTES</div>
          <textarea name="notes" value="{{ val.notes }}" onInput="{{ onField }}" rows="2" placeholder="Beta for future you — squeaks, quirks, what worked…" style="width:100%;resize:vertical;background:#1B1B1E;border:1px dotted #4a4a52;border-radius:4px;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:14px;font-weight:600;padding:8px 10px;min-height:52px"></textarea>
        </div>
      </div>
    </div>
  </sc-if>

  <div style="flex:1"></div>

  <div data-screen-label="Card style switcher" style="display:flex;align-items:center;gap:8px;padding:16px 12px 6px">
    <span style="font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.18em;color:#77777f">CARD STYLE</span>
    <div style="display:flex;gap:6px;margin-left:auto">
      <sc-for list="{{ styleOpts }}" as="s" hint-placeholder-count="3">
        <button onClick="{{ s.pick }}" style="font-size:12px;font-weight:600;letter-spacing:.08em;padding:10px 12px;border-radius:3px;border:1px solid {{ s.border }};background:{{ s.bg }};color:{{ s.color }};cursor:pointer">{{ s.label }}</button>
      </sc-for>
    </div>
  </div>

  <footer style="margin-top:10px">
    <div style="height:10px;background:repeating-linear-gradient(-45deg,#3a3a40 0 2px,transparent 2px 6px);border-top:1px solid #2c2c31;border-bottom:1px solid #2c2c31"></div>
    <div style="display:flex;justify-content:space-between;gap:10px;padding:12px 16px 20px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.14em;color:#77777f">
      <span>FULL SUSPENSION MTB SPEC SHEET</span>
      <span style="color:#F4661F">KEEP YOUR SHIT WIRED TIGHT</span>
    </div>
  </footer>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;cardStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sheet&quot;,&quot;inline&quot;,&quot;takeover&quot;],&quot;default&quot;:&quot;inline&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;units&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;PSI&quot;,&quot;BAR&quot;],&quot;default&quot;:&quot;PSI&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;}}">
const LS_KEY = 'mtb-tracker-v1';

const PARTS = [
  { id: 'fork', label: 'FORK PRESSURE', type: 'sus', x: 71, y: 34, box: { x: 63, y: 21, w: 13, h: 40 }, icon: 'fork', blurb: 'Keep the front end plush. Sag it, set it, send it.' },
  { id: 'shock', label: 'SHOCK PRESSURE', type: 'sus', x: 49, y: 52, box: { x: 41, y: 43, w: 16, h: 17 }, icon: 'shock', blurb: 'Dial your sag, find the flow.' },
  { id: 'front-tire', label: 'FRONT TIRE', type: 'tire', x: 95, y: 51, box: { x: 64.5, y: 34, w: 35, h: 66 }, icon: 'tire', blurb: 'Squish to match the dirt.' },
  { id: 'rear-tire', label: 'REAR TIRE', type: 'tire', x: 5, y: 49, box: { x: 0.5, y: 34, w: 35, h: 66 }, icon: 'tire', blurb: 'Low and grippy, not rim-bangy.' },
  { id: 'front-brake', label: 'FRONT BRAKE PADS', type: 'replace', interval: 6, x: 80, y: 66, box: { x: 74, y: 56, w: 12, h: 20 }, icon: 'brake', blurb: 'All stop, no squeal.' },
  { id: 'rear-brake', label: 'REAR BRAKE PADS', type: 'replace', interval: 6, x: 16, y: 63, box: { x: 11, y: 54, w: 12, h: 20 }, icon: 'brake', blurb: 'Fresh pads, fearless drops.' },
  { id: 'drivetrain', label: 'DRIVE TRAIN', type: 'replace', interval: 6, x: 22, y: 79, box: { x: 13, y: 54, w: 24, h: 32 }, icon: 'drive', blurb: 'Keep it buttery, not crunchy.' },
  { id: 'bb', label: 'BOTTOM BRACKET', type: 'replace', interval: 12, x: 37, y: 70, box: { x: 32, y: 61, w: 10, h: 18 }, icon: 'bb', blurb: 'Creaks are a cry for help.' },
  { id: 'front-axle', label: 'FRONT AXLE', type: 'torque', x: 84, y: 67, box: { x: 78, y: 60, w: 10, h: 15 }, icon: 'axle', blurb: 'Torque it true, roll worry-free.' },
  { id: 'rear-axle', label: 'REAR AXLE', type: 'torque', x: 12, y: 66, box: { x: 8, y: 59, w: 10, h: 15 }, icon: 'axle', blurb: 'Snug hub, no wobble.' },
  { id: 'hanger', label: 'DERAILLEUR HANGER', type: 'replace', interval: 12, x: 25, y: 84, box: { x: 19, y: 70, w: 10, h: 20 }, icon: 'hanger', blurb: 'Bent hanger, ghost shifting. Keep it straight.' },
  { id: 'headset', label: 'HEADSET', type: 'torque', x: 67, y: 22, box: { x: 60, y: 6, w: 13, h: 24 }, icon: 'headset', blurb: 'Snug, not crushed.' },
  { id: 'seat', label: 'SEAT', type: 'torque', x: 37, y: 27, box: { x: 23, y: 0, w: 17, h: 16 }, icon: 'seat', blurb: 'Dialed height, happy knees.' }
];

const BADGES = { tire: 'PRESSURE SETTINGS', sus: 'PRESSURE SETTINGS', torque: 'TORQUE SETTINGS', replace: 'REPLACEMENT DATE' };

class Component extends DCLogic {
  state = (() => {
    let data = null;
    try { data = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}
    if (!data || typeof data !== 'object') data = {};
    if (!data.bike) data.bike = { name: '', make: '', purchased: '' };
    if (!data.parts) data.parts = {};
    return { sel: null, data, bikeOpen: !data.bike.name, cardStyle: null };
  })();

  persist(data) {
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
  }

  pick(id) {
    this.setState(s => ({ sel: s.sel === id ? null : id, bikeOpen: false }));
  }

  closeCard = () => this.setState({ sel: null });

  onField = (e) => {
    const { name, value } = e.target;
    this.setState(s => {
      if (!s.sel) return null;
      const parts = { ...s.data.parts, [s.sel]: { ...(s.data.parts[s.sel] || {}), [name]: value } };
      const data = { ...s.data, parts };
      this.persist(data);
      return { data };
    });
  };

  onBikeField = (e) => {
    const { name, value } = e.target;
    this.setState(s => {
      const data = { ...s.data, bike: { ...s.data.bike, [name]: value } };
      this.persist(data);
      return { data };
    });
  };

  toggleBike = () => this.setState(s => ({ bikeOpen: !s.bikeOpen, sel: s.bikeOpen ? s.sel : null }));

  icon(name) {
    const h = React.createElement;
    const P = { fill: 'none', stroke: '#F4661F', strokeWidth: 3, strokeLinecap: 'round', strokeLinejoin: 'round', vectorEffect: 'non-scaling-stroke' };
    const shapes = {
      tire: [h('circle', { ...P, key: 1, cx: 50, cy: 50, r: 45, strokeDasharray: '7 5' }), h('circle', { ...P, key: 2, cx: 50, cy: 50, r: 34 })],
      shock: [h('rect', { ...P, key: 1, x: 14, y: 38, width: 46, height: 24, rx: 10 }), h('rect', { ...P, key: 2, x: 60, y: 43, width: 22, height: 14, rx: 4 }), h('path', { ...P, key: 3, d: 'M24 34 v32 M34 34 v32 M44 34 v32' })],
      fork: [h('path', { ...P, key: 1, d: 'M50 4 v20 M28 24 h44 M34 24 v64 M66 24 v64' }), h('circle', { ...P, key: 2, cx: 34, cy: 92, r: 3 }), h('circle', { ...P, key: 3, cx: 66, cy: 92, r: 3 })],
      brake: [h('circle', { ...P, key: 1, cx: 46, cy: 54, r: 32, strokeDasharray: '5 5' }), h('circle', { ...P, key: 2, cx: 46, cy: 54, r: 10 }), h('rect', { ...P, key: 3, x: 62, y: 8, width: 22, height: 24, rx: 5 })],
      drive: [h('circle', { ...P, key: 1, cx: 26, cy: 34, r: 16 }), h('circle', { ...P, key: 2, cx: 72, cy: 62, r: 11 }), h('circle', { ...P, key: 3, cx: 80, cy: 84, r: 6 }), h('path', { ...P, key: 4, d: 'M26 18 L72 51 M26 50 L72 73 L80 78' })],
      bb: [h('circle', { ...P, key: 1, cx: 50, cy: 50, r: 22 }), h('circle', { ...P, key: 2, cx: 50, cy: 50, r: 7 }), h('path', { ...P, key: 3, d: 'M18 50 h14 M68 50 h14' })],
      headset: [h('ellipse', { ...P, key: 1, cx: 50, cy: 32, rx: 24, ry: 9 }), h('ellipse', { ...P, key: 2, cx: 50, cy: 64, rx: 24, ry: 9 }), h('path', { ...P, key: 3, d: 'M26 32 v32 M74 32 v32' })],
      seat: [h('path', { ...P, key: 1, d: 'M12 34 Q46 16 86 28 Q64 44 12 34 Z' }), h('path', { ...P, key: 2, d: 'M54 40 v44 M44 84 h20' })],
      axle: [h('circle', { ...P, key: 1, cx: 50, cy: 50, r: 20 }), h('circle', { ...P, key: 2, cx: 50, cy: 50, r: 7 }), h('path', { ...P, key: 3, d: 'M50 12 v16 M50 72 v16 M12 50 h16 M72 50 h16' })],
      hanger: [h('path', { ...P, key: 1, d: 'M40 10 h22 l6 18 -10 34 h-14 Z' }), h('circle', { ...P, key: 2, cx: 51, cy: 22, r: 6 }), h('circle', { ...P, key: 3, cx: 51, cy: 74, r: 12 })]
    };
    return h('svg', { viewBox: '0 0 100 100', width: '100%', height: '100%', preserveAspectRatio: 'xMidYMid meet' }, shapes[name] || null);
  }

  renderVals() {
    const s = this.state;
    const accent = '#F4661F';
    const cardStyle = s.cardStyle || this.props.cardStyle || 'inline';
    const sel = PARTS.find(p => p.id === s.sel) || null;
    const pv = sel ? (s.data.parts[sel.id] || {}) : {};
    const val = {};
    ['dry', 'wet', 'model', 'sag', 'psi', 'comp', 'reb', 'nm', 'height', 'installed', 'checked', 'interval', 'notes'].forEach(k => { val[k] = pv[k] || ''; });

    const hotspots = PARTS.map(p => {
      const active = sel && sel.id === p.id;
      return {
        ...p,
        pick: () => this.pick(p.id),
        dotBg: active ? accent : '#1B1B1E',
        dotShadow: active ? '0 0 12px rgba(244,102,31,.95)' : 'none',
        ringExtra: active ? 'display:none' : ''
      };
    });

    const chips = PARTS.map(p => {
      const active = sel && sel.id === p.id;
      return {
        id: p.id,
        label: p.label,
        pick: () => this.pick(p.id),
        bg: active ? 'rgba(244,102,31,.15)' : '#232327',
        border: active ? accent : '#38383E',
        color: active ? accent : '#C9C9CF'
      };
    });

    const wraps = {
      sheet: 'position:fixed;left:0;right:0;bottom:0;margin:0 auto;width:100%;max-width:430px;z-index:40;animation:slideUp .4s cubic-bezier(.2,.9,.25,1)',
      inline: 'position:relative;margin:12px 12px 4px;animation:riseIn .35s ease',
      takeover: 'position:fixed;inset:0;margin:0 auto;max-width:430px;z-index:40;overflow:auto;animation:zoomIn .28s ease'
    };
    const inners = {
      sheet: 'border-radius:14px 14px 0 0;box-shadow:0 -14px 44px rgba(0,0,0,.55);padding-bottom:calc(18px + env(safe-area-inset-bottom))',
      inline: 'border-radius:6px',
      takeover: 'min-height:100%;border-radius:0;padding-bottom:48px'
    };

    const styleOpts = ['sheet', 'inline', 'takeover'].map(v => ({
      label: v.toUpperCase(),
      pick: () => this.setState({ cardStyle: v }),
      bg: v === cardStyle ? 'rgba(244,102,31,.15)' : 'none',
      border: v === cardStyle ? accent : '#38383E',
      color: v === cardStyle ? accent : '#9A9AA2'
    }));

    const bikeName = (s.data.bike.name || '').toUpperCase();
    const bikeMake = (s.data.bike.make || '').toUpperCase();
    const subtitle = [bikeName, bikeMake].filter(Boolean).join(' — ') || 'FULL SUSPENSION MTB — SET IT & SEND IT';

    return {
      bike: s.data.bike,
      bikeOpen: s.bikeOpen,
      toggleBike: this.toggleBike,
      bikeToggleLabel: s.bikeOpen ? 'DONE' : 'MY RIG',
      bikeSubtitle: subtitle,
      onBikeField: this.onBikeField,
      hotspots,
      chips,
      hasSel: !!sel,
      noSel: !sel,
      selLabel: sel ? sel.label : '',
      selBlurb: sel ? sel.blurb : '',
      selBox: sel ? sel.box : { x: 0, y: 0, w: 0, h: 0 },
      partOutline: sel ? this.icon(sel.icon) : null,
      typeBadge: sel ? BADGES[sel.type] : '',
      isTire: !!sel && sel.type === 'tire',
      isSus: !!sel && sel.type === 'sus',
      isTorque: !!sel && sel.type === 'torque',
      isReplace: !!sel && sel.type === 'replace',
      isSeat: !!sel && sel.id === 'seat',
      intervalDefault: sel && sel.interval ? String(sel.interval) : '6',
      val,
      onField: this.onField,
      closeCard: this.closeCard,
      unit: this.props.units || 'PSI',
      showBackdrop: !!sel && cardStyle === 'sheet',
      cardWrap: wraps[cardStyle] || wraps.inline,
      cardInnerExtra: inners[cardStyle] || inners.inline,
      cardKey: (sel ? sel.id : 'none') + '-' + cardStyle,
      styleOpts
    };
  }
}
</script>
</body>
</html>
