  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ground:none;border:1px solid #3a3a40;border-radius:3px;padding:10px 14px;cursor:pointer;min-height:44px\">{{ bikeToggleLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"font-size:11px;font-weight:700;color:#9A9AA2;margin-top:10px;letter-spacing:.16em;text-transform:uppercase\">{{ bikeSubtitle }}<\u002Fdiv>\n\n    <sc-if value=\"{{ bikeOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:14px;background:#232327;border:1px solid #313136;border-radius:6px;padding:4px 14px 14px;animation:riseIn .3s ease\">\n        <label style=\"display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid #313136\">\n          <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:104px\">NAME<\u002Fspan>\n          <input name=\"name\" value=\"{{ bike.name }}\" sc-camel-on-input=\"{{ onBikeField }}\" placeholder=\"e.g. The Mullet\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0\">\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:baseline;gap:12px;padding:10px 0;border-bottom:1px solid #313136\">\n          <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:104px\">MAKE / MODEL<\u002Fspan>\n          <input name=\"make\" value=\"{{ bike.make }}\" sc-camel-on-input=\"{{ onBikeField }}\" placeholder=\"brand + model\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0\">\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:baseline;gap:12px;padding:10px 0\">\n          <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:104px\">PURCHASED<\u002Fspan>\n          <input name=\"purchased\" type=\"date\" value=\"{{ bike.purchased }}\" sc-camel-on-input=\"{{ onBikeField }}\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0\">\n        <\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <section data-screen-label=\"Bike\" style=\"position:relative;margin:14px 12px 0;border:1px solid #2c2c31;border-radius:6px;background-image:radial-gradient(#26262b 1px, transparent 1px);background-size:18px 18px;padding:18px 10px 12px\">\n    <div style=\"position:relative;aspect-ratio:893/506\">\n      <img src=\"0481ccb6-9700-46cf-a3e4-a6b8a2827577\" alt=\"Bike silhouette\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:contain\">\n      <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute;left:{{ selBox.x }}%;top:{{ selBox.y }}%;width:{{ selBox.w }}%;height:{{ selBox.h }}%;pointer-events:none;filter:drop-shadow(0 0 7px rgba(244,102,31,.75));animation:fadeIn .3s ease\">{{ partOutline }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-for list=\"{{ hotspots }}\" as=\"h\" hint-placeholder-count=\"10\">\n        <button sc-camel-on-click=\"{{ h.pick }}\" aria-label=\"{{ h.label }}\" style=\"position:absolute;left:{{ h.x }}%;top:{{ h.y }}%;transform:translate(-50%,-50%);width:44px;height:44px;background:none;border:none;padding:0;cursor:pointer;z-index:2\">\n          <span style=\"position:absolute;inset:0;display:grid;place-items:center\">\n            <span style=\"position:absolute;width:22px;height:22px;border-radius:50%;border:2px solid rgba(244,102,31,.6);animation:pulseRing 2.2s ease-out infinite;{{ h.ringExtra }}\"><\u002Fspan>\n            <span style=\"width:14px;height:14px;border-radius:50%;background:{{ h.dotBg }};border:2px solid #F4661F;box-shadow:{{ h.dotShadow }}\"><\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ noSel }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"text-align:center;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.2em;color:#77777f;padding:6px 0 2px\">TAP A DOT TO DIAL IT IN<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <nav data-screen-label=\"Part chips\" style=\"display:flex;gap:8px;overflow-x:auto;padding:14px 12px 4px;scrollbar-width:none\">\n    <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"10\">\n      <button sc-camel-on-click=\"{{ c.pick }}\" style=\"flex:0 0 auto;font-size:13px;font-weight:600;letter-spacing:.07em;padding:12px 14px;border-radius:3px;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};cursor:pointer;min-height:44px\">{{ c.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fnav>\n\n  <sc-if value=\"{{ showBackdrop }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ closeCard }}\" style=\"position:fixed;inset:0;background:rgba(8,8,10,.55);backdrop-filter:blur(2px);z-index:30;animation:fadeIn .25s ease\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ hasSel }}\" hint-placeholder-val=\"{{ false }}\">\n    <div key=\"{{ cardKey }}\" data-screen-label=\"Part card\" style=\"{{ cardWrap }};box-sizing:border-box\">\n      <div style=\"background:#232327;border:1px solid #38383E;padding:0 16px 18px;{{ cardInnerExtra }}\">\n        <div style=\"height:14px;margin:0 -16px;background:repeating-linear-gradient(-45deg,#4a4a52 0 2px,transparent 2px 6px);border-bottom:1px solid #38383E\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px\">\n          <span style=\"font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.22em;color:#F4661F\">{{ typeBadge }}<\u002Fspan>\n          <button sc-camel-on-click=\"{{ closeCard }}\" aria-label=\"Close\" style=\"background:none;border:1px solid #3a3a40;border-radius:3px;color:#9A9AA2;width:40px;height:40px;font-size:18px;cursor:pointer;line-height:1\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:28px;margin:6px 0 2px;letter-spacing:.01em;text-transform:uppercase;line-height:1\">{{ selLabel }}<\u002Fh2>\n        <p style=\"margin:0 0 6px;font-size:13px;color:#9A9AA2\">{{ selBlurb }}<\u002Fp>\n\n        <sc-if value=\"{{ isTire }}\" hint-placeholder-val=\"{{ false }}\">\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">DRY &amp; DUSTY<\u002Fspan>\n            <input name=\"dry\" value=\"{{ val.dry }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"decimal\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">{{ unit }}<\u002Fspan>\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">WET &amp; WILD<\u002Fspan>\n            <input name=\"wet\" value=\"{{ val.wet }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"decimal\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">{{ unit }}<\u002Fspan>\n          <\u002Flabel>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isSus }}\" hint-placeholder-val=\"{{ false }}\">\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">MODEL<\u002Fspan>\n            <input name=\"model\" value=\"{{ val.model }}\" sc-camel-on-input=\"{{ onField }}\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right\">\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">SAG<\u002Fspan>\n            <input name=\"sag\" value=\"{{ val.sag }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"decimal\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">%<\u002Fspan>\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">PRESSURE<\u002Fspan>\n            <input name=\"psi\" value=\"{{ val.psi }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"decimal\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">{{ unit }}<\u002Fspan>\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">COMPRESSION<\u002Fspan>\n            <input name=\"comp\" value=\"{{ val.comp }}\" sc-camel-on-input=\"{{ onField }}\" placeholder=\"clicks\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">REBOUND<\u002Fspan>\n            <input name=\"reb\" value=\"{{ val.reb }}\" sc-camel-on-input=\"{{ onField }}\" placeholder=\"clicks\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n          <\u002Flabel>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isTorque }}\" hint-placeholder-val=\"{{ false }}\">\n          <sc-if value=\"{{ isSeat }}\" hint-placeholder-val=\"{{ false }}\">\n            <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n              <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">HEIGHT<\u002Fspan>\n              <input name=\"height\" value=\"{{ val.height }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"decimal\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n              <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">MM<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fsc-if>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">TORQUE<\u002Fspan>\n            <input name=\"nm\" value=\"{{ val.nm }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"decimal\" placeholder=\"—\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">NM<\u002Fspan>\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">LAST CHECKED<\u002Fspan>\n            <input name=\"checked\" type=\"date\" value=\"{{ val.checked }}\" sc-camel-on-input=\"{{ onField }}\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right\">\n          <\u002Flabel>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isReplace }}\" hint-placeholder-val=\"{{ false }}\">\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">INSTALLED<\u002Fspan>\n            <input name=\"installed\" type=\"date\" value=\"{{ val.installed }}\" sc-camel-on-input=\"{{ onField }}\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right\">\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">LAST CHECKED<\u002Fspan>\n            <input name=\"checked\" type=\"date\" value=\"{{ val.checked }}\" sc-camel-on-input=\"{{ onField }}\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 0;text-align:right\">\n          <\u002Flabel>\n          <label style=\"display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px solid #313136\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;min-width:130px\">SWAP EVERY<\u002Fspan>\n            <input name=\"interval\" value=\"{{ val.interval }}\" sc-camel-on-input=\"{{ onField }}\" sc-camel-input-mode=\"numeric\" placeholder=\"{{ intervalDefault }}\" style=\"flex:1;min-width:0;background:none;border:none;border-bottom:1px dotted #4a4a52;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:18px;font-weight:700;padding:2px 0;text-align:right\">\n            <span style=\"font-family:'Oswald',sans-serif;font-size:12px;color:#9A9AA2\">MONTHS<\u002Fspan>\n          <\u002Flabel>\n          <div style=\"font-size:11px;color:#77777f;padding-top:8px\">Stock suggestion: every {{ intervalDefault }} months. Ride more, swap sooner.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"padding-top:12px\">\n          <div style=\"font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.08em;color:#9A9AA2;padding-bottom:6px\">NOTES<\u002Fdiv>\n          <textarea name=\"notes\" value=\"{{ val.notes }}\" sc-camel-on-input=\"{{ onField }}\" rows=\"2\" placeholder=\"Beta for future you — squeaks, quirks, what worked…\" style=\"width:100%;resize:vertical;background:#1B1B1E;border:1px dotted #4a4a52;border-radius:4px;color:#F4661F;font-family:'Open Sans',sans-serif;font-size:14px;font-weight:600;padding:8px 10px;min-height:52px\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"flex:1\"><\u002Fdiv>\n\n  <div data-screen-label=\"Card style switcher\" style=\"display:flex;align-items:center;gap:8px;padding:16px 12px 6px\">\n    <span style=\"font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.18em;color:#77777f\">CARD STYLE<\u002Fspan>\n    <div style=\"display:flex;gap:6px;margin-left:auto\">\n      <sc-for list=\"{{ styleOpts }}\" as=\"s\" hint-placeholder-count=\"3\">\n        <button sc-camel-on-click=\"{{ s.pick }}\" style=\"font-size:12px;font-weight:600;letter-spacing:.08em;padding:10px 12px;border-radius:3px;border:1px solid {{ s.border }};background:{{ s.bg }};color:{{ s.color }};cursor:pointer\">{{ s.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <footer style=\"margin-top:10px\">\n    <div style=\"height:10px;background:repeating-linear-gradient(-45deg,#3a3a40 0 2px,transparent 2px 6px);border-top:1px solid #2c2c31;border-bottom:1px solid #2c2c31\"><\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;gap:10px;padding:12px 16px 20px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.14em;color:#77777f\">\n      <span>FULL SUSPENSION MTB SPEC SHEET<\u002Fspan>\n      <span style=\"color:#F4661F\">KEEP YOUR SHIT WIRED TIGHT<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;cardStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;sheet&quot;,&quot;inline&quot;,&quot;takeover&quot;],&quot;default&quot;:&quot;inline&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;},&quot;units&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;PSI&quot;,&quot;BAR&quot;],&quot;default&quot;:&quot;PSI&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Behavior&quot;}}\">\nconst LS_KEY = 'mtb-tracker-v1';\n\nconst PARTS = [\n  { id: 'fork', label: 'FORK PRESSURE', type: 'sus', x: 71, y: 34, box: { x: 63, y: 21, w: 13, h: 40 }, icon: 'fork', blurb: 'Keep the front end plush. Sag it, set it, send it.' },\n  { id: 'shock', label: 'SHOCK PRESSURE', type: 'sus', x: 49, y: 52, box: { x: 41, y: 43, w: 16, h: 17 }, icon: 'shock', blurb: 'Dial your sag, find the flow.' },\n  { id: 'front-tire', label: 'FRONT TIRE', type: 'tire', x: 95, y: 51, box: { x: 64.5, y: 34, w: 35, h: 66 }, icon: 'tire', blurb: 'Squish to match the dirt.' },\n  { id: 'rear-tire', label: 'REAR TIRE', type: 'tire', x: 5, y: 49, box: { x: 0.5, y: 34, w: 35, h: 66 }, icon: 'tire', blurb: 'Low and grippy, not rim-bangy.' },\n  { id: 'front-brake', label: 'FRONT BRAKE PADS', type: 'replace', interval: 6, x: 80, y: 66, box: { x: 74, y: 56, w: 12, h: 20 }, icon: 'brake', blurb: 'All stop, no squeal.' },\n  { id: 'rear-brake', label: 'REAR BRAKE PADS', type: 'replace', interval: 6, x: 16, y: 63, box: { x: 11, y: 54, w: 12, h: 20 }, icon: 'brake', blurb: 'Fresh pads, fearless drops.' },\n  { id: 'drivetrain', label: 'DRIVE TRAIN', type: 'replace', interval: 6, x: 22, y: 79, box: { x: 13, y: 54, w: 24, h: 32 }, icon: 'drive', blurb: 'Keep it buttery, not crunchy.' },\n  { id: 'bb', label: 'BOTTOM BRACKET', type: 'replace', interval: 12, x: 37, y: 70, box: { x: 32, y: 61, w: 10, h: 18 }, icon: 'bb', blurb: 'Creaks are a cry for help.' },\n  { id: 'front-axle', label: 'FRONT AXLE', type: 'torque', x: 84, y: 67, box: { x: 78, y: 60, w: 10, h: 15 }, icon: 'axle', blurb: 'Torque it true, roll worry-free.' },\n  { id: 'rear-axle', label: 'REAR AXLE', type: 'torque', x: 12, y: 66, box: { x: 8, y: 59, w: 10, h: 15 }, icon: 'axle', blurb: 'Snug hub, no wobble.' },\n  { id: 'hanger', label: 'DERAILLEUR HANGER', type: 'replace', interval: 12, x: 25, y: 84, box: { x: 19, y: 70, w: 10, h: 20 }, icon: 'hanger', blurb: 'Bent hanger, ghost shifting. Keep it straight.' },\n  { id: 'headset', label: 'HEADSET', type: 'torque', x: 67, y: 22, box: { x: 60, y: 6, w: 13, h: 24 }, icon: 'headset', blurb: 'Snug, not crushed.' },\n  { id: 'seat', label: 'SEAT', type: 'torque', x: 37, y: 27, box: { x: 23, y: 0, w: 17, h: 16 }, icon: 'seat', blurb: 'Dialed height, happy knees.' }\n];\n\nconst BADGES = { tire: 'PRESSURE SETTINGS', sus: 'PRESSURE SETTINGS', torque: 'TORQUE SETTINGS', replace: 'REPLACEMENT DATE' };\n\nclass Component extends DCLogic {\n  state = (() => {\n    let data = null;\n    try { data = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}\n    if (!data || typeof data !== 'object') data = {};\n    if (!data.bike) data.bike = { name: '', make: '', purchased: '' };\n    if (!data.parts) data.parts = {};\n    return { sel: null, data, bikeOpen: !data.bike.name, cardStyle: null };\n  })();\n\n  persist(data) {\n    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}\n  }\n\n  pick(id) {\n    this.setState(s => ({ sel: s.sel === id ? null : id, bikeOpen: false }));\n  }\n\n  closeCard = () => this.setState({ sel: null });\n\n  onField = (e) => {\n    const { name, value } = e.target;\n    this.setState(s => {\n      if (!s.sel) return null;\n      const parts = { ...s.data.parts, [s.sel]: { ...(s.data.parts[s.sel] || {}), [name]: value } };\n      const data = { ...s.data, parts };\n      this.persist(data);\n      return { data };\n    });\n  };\n\n  onBikeField = (e) => {\n    const { name, value } = e.target;\n    this.setState(s => {\n      const data = { ...s.data, bike: { ...s.data.bike, [name]: value } };\n      this.persist(data);\n      return { data };\n    });\n  };\n\n  toggleBike = () => this.setState(s => ({ bikeOpen: !s.bikeOpen, sel: s.bikeOpen ? s.sel : null }));\n\n  icon(name) {\n    const h = React.createElement;\n    const P = { fill: 'none', stroke: '#F4661F', strokeWidth: 3, strokeLinecap: 'round', strokeLinejoin: 'round', vectorEffect: 'non-scaling-stroke' };\n    const shapes = {\n      tire: [h('circle', { ...P, key: 1, cx: 50, cy: 50, r: 45, strokeDasharray: '7 5' }), h('circle', { ...P, key: 2, cx: 50, cy: 50, r: 34 })],\n      shock: [h('rect', { ...P, key: 1, x: 14, y: 38, width: 46, height: 24, rx: 10 }), h('rect', { ...P, key: 2, x: 60, y: 43, width: 22, height: 14, rx: 4 }), h('path', { ...P, key: 3, d: 'M24 34 v32 M34 34 v32 M44 34 v32' })],\n      fork: [h('path', { ...P, key: 1, d: 'M50 4 v20 M28 24 h44 M34 24 v64 M66 24 v64' }), h('circle', { ...P, key: 2, cx: 34, cy: 92, r: 3 }), h('circle', { ...P, key: 3, cx: 66, cy: 92, r: 3 })],\n      brake: [h('circle', { ...P, key: 1, cx: 46, cy: 54, r: 32, strokeDasharray: '5 5' }), h('circle', { ...P, key: 2, cx: 46, cy: 54, r: 10 }), h('rect', { ...P, key: 3, x: 62, y: 8, width: 22, height: 24, rx: 5 })],\n      drive: [h('circle', { ...P, key: 1, cx: 26, cy: 34, r: 16 }), h('circle', { ...P, key: 2, cx: 72, cy: 62, r: 11 }), h('circle', { ...P, key: 3, cx: 80, cy: 84, r: 6 }), h('path', { ...P, key: 4, d: 'M26 18 L72 51 M26 50 L72 73 L80 78' })],\n      bb: [h('circle', { ...P, key: 1, cx: 50, cy: 50, r: 22 }), h('circle', { ...P, key: 2, cx: 50, cy: 50, r: 7 }), h('path', { ...P, key: 3, d: 'M18 50 h14 M68 50 h14' })],\n      headset: [h('ellipse', { ...P, key: 1, cx: 50, cy: 32, rx: 24, ry: 9 }), h('ellipse', { ...P, key: 2, cx: 50, cy: 64, rx: 24, ry: 9 }), h('path', { ...P, key: 3, d: 'M26 32 v32 M74 32 v32' })],\n      seat: [h('path', { ...P, key: 1, d: 'M12 34 Q46 16 86 28 Q64 44 12 34 Z' }), h('path', { ...P, key: 2, d: 'M54 40 v44 M44 84 h20' })],\n      axle: [h('circle', { ...P, key: 1, cx: 50, cy: 50, r: 20 }), h('circle', { ...P, key: 2, cx: 50, cy: 50, r: 7 }), h('path', { ...P, key: 3, d: 'M50 12 v16 M50 72 v16 M12 50 h16 M72 50 h16' })],\n      hanger: [h('path', { ...P, key: 1, d: 'M40 10 h22 l6 18 -10 34 h-14 Z' }), h('circle', { ...P, key: 2, cx: 51, cy: 22, r: 6 }), h('circle', { ...P, key: 3, cx: 51, cy: 74, r: 12 })]\n    };\n    return h('svg', { viewBox: '0 0 100 100', width: '100%', height: '100%', preserveAspectRatio: 'xMidYMid meet' }, shapes[name] || null);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const accent = '#F4661F';\n    const cardStyle = s.cardStyle || this.props.cardStyle || 'inline';\n    const sel = PARTS.find(p => p.id === s.sel) || null;\n    const pv = sel ? (s.data.parts[sel.id] || {}) : {};\n    const val = {};\n    ['dry', 'wet', 'model', 'sag', 'psi', 'comp', 'reb', 'nm', 'height', 'installed', 'checked', 'interval', 'notes'].forEach(k => { val[k] = pv[k] || ''; });\n\n    const hotspots = PARTS.map(p => {\n      const active = sel && sel.id === p.id;\n      return {\n        ...p,\n        pick: () => this.pick(p.id),\n        dotBg: active ? accent : '#1B1B1E',\n        dotShadow: active ? '0 0 12px rgba(244,102,31,.95)' : 'none',\n        ringExtra: active ? 'display:none' : ''\n      };\n    });\n\n    const chips = PARTS.map(p => {\n      const active = sel && sel.id === p.id;\n      return {\n        id: p.id,\n        label: p.label,\n        pick: () => this.pick(p.id),\n        bg: active ? 'rgba(244,102,31,.15)' : '#232327',\n        border: active ? accent : '#38383E',\n        color: active ? accent : '#C9C9CF'\n      };\n    });\n\n    const wraps = {\n      sheet: 'position:fixed;left:0;right:0;bottom:0;margin:0 auto;width:100%;max-width:430px;z-index:40;animation:slideUp .4s cubic-bezier(.2,.9,.25,1)',\n      inline: 'position:relative;margin:12px 12px 4px;animation:riseIn .35s ease',\n      takeover: 'position:fixed;inset:0;margin:0 auto;max-width:430px;z-index:40;overflow:auto;animation:zoomIn .28s ease'\n    };\n    const inners = {\n      sheet: 'border-radius:14px 14px 0 0;box-shadow:0 -14px 44px rgba(0,0,0,.55);padding-bottom:calc(18px + env(safe-area-inset-bottom))',\n      inline: 'border-radius:6px',\n      takeover: 'min-height:100%;border-radius:0;padding-bottom:48px'\n    };\n\n    const styleOpts = ['sheet', 'inline', 'takeover'].map(v => ({\n      label: v.toUpperCase(),\n      pick: () => this.setState({ cardStyle: v }),\n      bg: v === cardStyle ? 'rgba(244,102,31,.15)' : 'none',\n      border: v === cardStyle ? accent : '#38383E',\n      color: v === cardStyle ? accent : '#9A9AA2'\n    }));\n\n    const bikeName = (s.data.bike.name || '').toUpperCase();\n    const bikeMake = (s.data.bike.make || '').toUpperCase();\n    const subtitle = [bikeName, bikeMake].filter(Boolean).join(' — ') || 'FULL SUSPENSION MTB — SET IT & SEND IT';\n\n    return {\n\n      bike: s.data.bike,\n      bikeOpen: s.bikeOpen,\n      toggleBike: this.toggleBike,\n      bikeToggleLabel: s.bikeOpen ? 'DONE' : 'MY RIG',\n      bikeSubtitle: subtitle,\n      onBikeField: this.onBikeField,\n      hotspots,\n      chips,\n      hasSel: !!sel,\n      noSel: !sel,\n      selLabel: sel ? sel.label : '',\n      selBlurb: sel ? sel.blurb : '',\n      selBox: sel ? sel.box : { x: 0, y: 0, w: 0, h: 0 },\n      partOutline: sel ? this.icon(sel.icon) : null,\n      typeBadge: sel ? BADGES[sel.type] : '',\n      isTire: !!sel && sel.type === 'tire',\n      isSus: !!sel && sel.type === 'sus',\n      isTorque: !!sel && sel.type === 'torque',\n      isReplace: !!sel && sel.type === 'replace',\n      isSeat: !!sel && sel.id === 'seat',\n      intervalDefault: sel && sel.interval ? String(sel.interval) : '6',\n      val,\n      onField: this.onField,\n      closeCard: this.closeCard,\n      unit: this.props.units || 'PSI',\n      showBackdrop: !!sel && cardStyle === 'sheet',\n      cardWrap: wraps[cardStyle] || wraps.inline,\n      cardInnerExtra: inners[cardStyle] || inners.inline,\n      cardKey: (sel ? sel.id : 'none') + '-' + cardStyle,\n      styleOpts\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
